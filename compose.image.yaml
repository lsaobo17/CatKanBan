services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-catkanban}
      POSTGRES_USER: ${POSTGRES_USER:-catkanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-catkanban}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: ${CATKANBAN_IMAGE:-ghcr.io/lsaobo17/catkanban:latest}
    init: true
    restart: unless-stopped
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3000}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-catkanban}
      POSTGRES_USER: ${POSTGRES_USER:-catkanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-catkanban}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
      ADMIN_NAME: ${ADMIN_NAME:-CatKanBan Admin}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${WEB_PORT:-8080}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${API_PORT:-3000}/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
