services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-catkanban}
      POSTGRES_USER: ${POSTGRES_USER:-catkanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-catkanban}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-catkanban}:${POSTGRES_PASSWORD:-catkanban}@db:5432/${POSTGRES_DB:-catkanban}?schema=public
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  postgres-data:

