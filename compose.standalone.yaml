services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${CATKANBAN_IMAGE:-catkanban:standalone}
    init: true
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:3000"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${API_PORT:-3000}/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
